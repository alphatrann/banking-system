name: banking-system-dev
services:
  postgres:
    image: postgres:alpine
    container_name: banking-system-postgres-dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data_dev:/var/lib/postgresql
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=banking-system

  redis:
    image: redis:alpine
    container_name: banking-system-redis-dev
    ports:
      - '6379:6379'
    volumes:
      - redis_data_dev:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    command: ['redis-server', '/usr/local/etc/redis/redis.conf']

  mail:
    container_name: banking-system-mail-dev
    image: axllent/mailpit:latest
    ports:
      - 8025:8025
      - 1025:1025
    environment:
      - MP_DATABASE=/data/mailpit.db
      - TZ=Asia/Saigon
    volumes:
      - mailpit_data_dev:/data

  minio:
    image: minio/minio:latest
    container_name: banking-system-minio-dev
    ports:
      - '9000:9000'
      - '9001:9001' # MinIO Console port
    environment:
      MINIO_ROOT_USER: 'admin'
      MINIO_ROOT_PASSWORD: 'password'
    command: server /data --console-address ":9001"
    volumes:
      - minio_data_dev:/data

  prometheus:
    image: prom/prometheus:latest
    container_name: banking-system-prometheus-dev
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: banking-system-grafana-dev
    ports:
      - '3000:3000'
    volumes:
      - grafana_data_dev:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: 'Admin'
      GF_SERVER_ROOT_URL: 'http://localhost:3000'
    depends_on:
      - prometheus
      - otel-collector
      - loki
      - jaeger

  loki:
    image: grafana/loki:latest
    container_name: banking-system-loki-dev
    ports:
      - '3100:3100'
    command: -config.file=/etc/loki/loki.yaml
    volumes:
      - ./loki/loki.yaml:/etc/loki/loki.yaml

  jaeger:
    image: jaegertracing/jaeger:latest
    container_name: banking-system-jaeger-dev
    ports:
      - '6831:6831/udp' # UDP port for Jaeger agent
      - '16686:16686' # Web UI
      - '14268:14268' # HTTP port for spans

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: banking-system-otel-collector-dev
    command: ['--config=/etc/otel-collector/otel.yaml']
    ports:
      - '4317:4317' # OTLP gRPC receiver
    volumes:
      - ./otel-collector/otel.yaml:/etc/otel-collector/otel.yaml
    depends_on:
      - loki
      - jaeger

volumes:
  postgres_data_dev:
  redis_data_dev:
  minio_data_dev:
  mailpit_data_dev:
  grafana_data_dev:
