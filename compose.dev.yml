name: payment-system
services:
  postgres:
    image: postgres:alpine
    container_name: payment-system-postgres
    ports:
      - '5432:5432'
    volumes:
      - /var/lib/postgresql:/var/lib/postgresql
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=payment-system

  redis:
    image: redis:alpine
    container_name: payment-system-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    command: ['redis-server', '/usr/local/etc/redis/redis.conf']

  mail:
    container_name: payment-system-mail
    image: jijiechen/papercut:latest
    ports:
      - 25:25
      - 37408:37408

volumes:
  postgres-data:
  redis_data:
