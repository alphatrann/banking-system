name: banking-system-test
services:
  postgres:
    image: postgres:alpine
    container_name: banking-system-postgres-test
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=banking-system-test

  redis:
    image: redis:alpine
    container_name: banking-system-redis-test
    ports:
      - '6379:6379'

volumes:
  postgres_data:
  redis_data:
  minio_data:
  mailpit_data:
  grafana_data:
