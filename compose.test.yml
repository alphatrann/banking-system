name: payment-system
services:
  postgres:
    image: postgres:alpine
    container_name: payment-system-postgres-test
    ports:
      - '5433:5432'
    volumes:
      - /var/lib/postgresql:/var/lib/postgresql
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=payment-system

  redis:
    image: redis:alpine
    container_name: payment-system-redis-test
    restart: always
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    command: ['redis-server', '/usr/local/etc/redis/redis.conf']

  mail:
    container_name: payment-system-mail-test
    image: jijiechen/papercut:latest
    ports:
      - 26:25
      - 37409:37408

volumes:
  postgres-data:
  redis_data:
